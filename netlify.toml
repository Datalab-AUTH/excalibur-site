# Netlify configuration

# Security headers applied to all routes
[[headers]]
  for = "/*"
  [headers.values]
    # Prevent clickjacking (legacy browsers)
    X-Frame-Options = "DENY"

    # Prevent MIME-type sniffing
    X-Content-Type-Options = "nosniff"

    # Force HTTPS for 1 year, include subdomains, allow preloading
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"

    # Limit referrer information sent cross-origin
    Referrer-Policy = "strict-origin-when-cross-origin"

    # Restrict access to sensitive browser APIs
    Permissions-Policy = "accelerometer=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=()"

    # Prevent cross-origin window references (protects against Spectre-style attacks)
    Cross-Origin-Opener-Policy = "same-origin"

    # Content Security Policy
    # - script-src: 'unsafe-inline' is required for Astro's island hydration runtime
    #   (client:load / client:idle directives inject inline <script> tags that cannot
    #    be avoided without Astro-level nonce middleware).
    # - style-src: 'unsafe-inline' required for Astro inlined stylesheets and Tailwind
    # - connect-src: self + Plausible event endpoint + Web3Forms API
    # - frame-ancestors: replaces X-Frame-Options for modern browsers
    # - upgrade-insecure-requests: automatically upgrade HTTP sub-resources to HTTPS
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://analytics.csd.auth.gr; style-src 'self' 'unsafe-inline'; font-src 'self'; img-src 'self' data:; connect-src 'self' https://analytics.csd.auth.gr https://api.web3forms.com; frame-src 'none'; frame-ancestors 'none'; base-uri 'self'; form-action 'self' https://api.web3forms.com; object-src 'none'; upgrade-insecure-requests;"
